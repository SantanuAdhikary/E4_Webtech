<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>keyboard event</title>

    <style>
           *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
           }

           .outer{
            height: 100vh;
            background: linear-gradient(to right top,#DAF7F7,#E0D4A4);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap:25px;
           }

           .outer > h1{
            letter-spacing: 2px;
            text-transform: capitalize;
            color: whitesmoke;
            text-shadow: 4px 4px 4px black;
           }

           input{
            width: 400px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            box-shadow: 3px 4px 4px rgba(0,0,0,0.7);
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 1.7px;
        }
        
        input::placeholder{
            font-size: 17px;
            text-align: center;
            text-transform: capitalize;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        section{
            width: 500px;
            height: 200px;
            border-radius: 20px;
            background-color: #fefefe;
            box-shadow: 3px 4px 4px rgba(0,0,0,0.7);
            padding: 10px 30px;
            font-style: italic;
            letter-spacing: 1.3px;
           }
    </style>
</head>
<body>
    

    <div class="outer">
          
          <h1> keyboard event </h1>
          <input type="text" placeholder="enter your data">
          <section>

              
          </section>
    </div>

    <script src="./keyboardtask.js"></script>
</body>
</html>
