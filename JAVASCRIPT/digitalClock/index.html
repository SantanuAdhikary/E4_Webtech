<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>digital clock</title>

    <style>
         *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
         }

         .outer{
            height: 100vh;
            background: url("https://i.pinimg.com/736x/6f/a7/a7/6fa7a76e9caa133c8539d29fd6e7cabb.jpg");
            background-repeat: no-repeat;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .outer > .inner{
            height: 150px;
            width: 400px;
            /* background-color: white; */
            display: flex;
            justify-content: center;
            align-items: center;

         }

         .inner > h1{
            letter-spacing: 5px;
            color:white;
            font-size: 50px;
            text-shadow: 2px 3px 3px rgb(138, 138, 23);
         }
         
    </style>
</head>
<body>
    
    <div class="outer">


        <div class="inner">

        </div>

    </div>

    <script src="./app.js"></script>
</body>
</html>
