<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>counter</title>

    <style>
          *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
          }
         .outer{
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap:50px;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right top , skyblue,white);
         }

         button{
            padding: 20px 40px;
            border-radius: 10px;
            border: none;
            font-size: 17px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-right: 20px;
            color:white;
            
         }

         .inc{
            background-color: orangered;
         }
         .dec{
            background-color: green;
         }
         .reset{
            background-color: black;

         }

         #num{
            font-size: 60px;
         }
      
    </style>
</head>
<body>
    
    <div class="outer">
           <h1 id="num">0</h1>

    <div class="section">
        
        <button class="inc">increment</button>
        <button class="dec">decrement</button>
        <button class="reset">reset</button>
    </div>

    </div>

    <script src="./counter.js"></script>
</body>
</html>
