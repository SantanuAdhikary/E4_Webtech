<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>

    <style>
          *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
          }

          nav{
            height: 85px;
            background-color: black;
            color:white;
            display: flex;
            align-items: center;
            justify-content: space-around;
          }

          nav > .aside{
            display: flex;
            gap:20px;
          }

          .aside > button{
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            /* font-size: 18px; */
            cursor: pointer;
            background-color: orangered;
            color: white;
            letter-spacing: 1.2px;
          }

          main{
            min-height: calc(100vh - 85px);
             background: linear-gradient(to top right,white,rgb(101, 101, 255));
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap:20px;
            padding-top: 20px;
          }

          .card{
            height: 250px;
            width: 350px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 2px 3px 5px rgba(0,0,0,0.8);
            padding: 20px;
            cursor: pointer;
            transition: transform 0.4s ease-in;
            overflow: auto;
            
          }

          .card::-webkit-scrollbar{
            display: none;
          }

          .card:hover{
            transform: scale(1.02);
          }

          .card > img{
            height: 100px;
            display: block;
            margin: auto;
            margin-bottom: 10px;
          }

          .card > h3{
            margin-bottom: 10px;
          }
    </style>
</head>
<body>
   

     <nav>
            <h1>productApp</h1>

            <div class="aside">
                <h2 id="h2"></h2>
                <button class="logout">logout</button>
            </div>
     </nav>

     <main>

     </main>

     <script src="./home.js"></script>
</body>
</html>
