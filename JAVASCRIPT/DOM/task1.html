<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 1</title>

    <style>
         *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
         }

         .outer{
            height: 100vh;
            background: linear-gradient(to right top,skyblue,white);
           position: relative;
        }
        
        .inner{
            height: 70%;
            width: 80%;
            background-color: #fefefe;
            position: absolute;
            left:50%;
            top:50%;
            transform: translate(-50%,-50%);
            border-radius: 25px;
            box-shadow: 4px 5px 6px rgba(0,0,0,0.7);

            display: flex;
            justify-content: center;
            align-items: center;
         }

         .circle{
            height: 200px;
            width: 200px;
            background-color: rgb(179, 179, 216);
            border-radius: 50%;
            box-shadow: 3px 4px 6px skyblue;

            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.4s ease-in;
         }

         .circle:hover{
            transform: scale(1.04);
         }

         .circle > h2{
            letter-spacing: 2px;
            color:white;
            text-shadow: 2px 2px 2px black;
            text-transform: uppercase;
         }
    </style>
</head>
<body>
    
    <div class="outer">

    </div>

    <script src="./task1.js"></script>
</body>
</html>
